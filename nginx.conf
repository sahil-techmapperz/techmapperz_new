server {
    listen 80;
    server_name techmapperz.com www.techmapperz.com;

    # Enable gzip compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    # Serve Next.js static files directly (fastest)
    location /_next/static/ {
        alias /var/www/techmapperz/.next/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Serve files from the public folder directly
    location /public/ {
        alias /var/www/techmapperz/public/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Proxy everything else to the Next.js server running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
